<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="rgba(255,255,255,0.1)"/>
  <circle cx="700" cy="350" r="120" fill="rgba(255,255,255,0.08)"/>
  <circle cx="400" cy="225" r="60" fill="rgba(255,255,255,0.15)"/>
  
  <!-- Film strip pattern -->
  <g fill="rgba(255,255,255,0.2)">
    <rect x="50" y="200" width="20" height="20" rx="3"/>
    <rect x="80" y="200" width="20" height="20" rx="3"/>
    <rect x="110" y="200" width="20" height="20" rx="3"/>
    <rect x="140" y="200" width="20" height="20" rx="3"/>
    <rect x="170" y="200" width="20" height="20" rx="3"/>
    <rect x="200" y="200" width="20" height="20" rx="3"/>
    <rect x="230" y="200" width="20" height="20" rx="3"/>
    <rect x="260" y="200" width="20" height="20" rx="3"/>
    <rect x="290" y="200" width="20" height="20" rx="3"/>
    <rect x="320" y="200" width="20" height="20" rx="3"/>
    <rect x="350" y="200" width="20" height="20" rx="3"/>
    <rect x="380" y="200" width="20" height="20" rx="3"/>
    <rect x="410" y="200" width="20" height="20" rx="3"/>
    <rect x="440" y="200" width="20" height="20" rx="3"/>
    <rect x="470" y="200" width="20" height="20" rx="3"/>
    <rect x="500" y="200" width="20" height="20" rx="3"/>
    <rect x="530" y="200" width="20" height="20" rx="3"/>
    <rect x="560" y="200" width="20" height="20" rx="3"/>
    <rect x="590" y="200" width="20" height="20" rx="3"/>
    <rect x="620" y="200" width="20" height="20" rx="3"/>
    <rect x="650" y="200" width="20" height="20" rx="3"/>
    <rect x="680" y="200" width="20" height="20" rx="3"/>
    <rect x="710" y="200" width="20" height="20" rx="3"/>
    <rect x="740" y="200" width="20" height="20" rx="3"/>
  </g>
  
  <!-- Play button icon -->
  <polygon points="380,180 380,270 460,225" fill="white" opacity="0.9"/>
  <circle cx="420" cy="225" r="70" fill="none" stroke="white" stroke-width="4" opacity="0.5"/>
  
  <!-- Text -->
  <text x="400" y="350" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle" opacity="0.8">ANIME DRAMA</text>
  <text x="400" y="380" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" opacity="0.6">幻域漫剧工作室</text>
</svg>
